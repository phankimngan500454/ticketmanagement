name: ticketmanagement
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  fl_chart: ^1.1.1
  serverpod_flutter: 3.4.4
  url_launcher: ^6.3.0
  file_picker: ^9.0.2
  ticketmanagement_server_client:
    path: ticketmanagement_server/ticketmanagement_server_client
  # Push notifications
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.4
  flutter_local_notifications: ^18.0.1
  shared_preferences: ^2.5.5
  go_router: ^17.1.0
  window_manager: ^0.4.3
  local_notifier: ^0.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/app_icon.png"
    background_color: "#1A237E"
    theme_color: "#3949AB"
  windows:
    generate: true
    image_path: "assets/app_icon.png"
    icon_size: 48
