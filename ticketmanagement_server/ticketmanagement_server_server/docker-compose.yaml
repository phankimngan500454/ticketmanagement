services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: ticketmanagement_server
      POSTGRES_PASSWORD: "9-0-qNvHZWF21k38HxbIdEK48QV_Hq_C"
    volumes:
      - ticketmanagement_server_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "6hBb2HiqRwonPMXEMp23E3NQ8C82xv77"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: ticketmanagement_server_test
      POSTGRES_PASSWORD: "wOTP-LHz02HIPnwTkXm6XTSMD2Ym-sVw"
    volumes:
      - ticketmanagement_server_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "Uh7cxf7h-zxbNUVOmWs-mb1XS8n5utDe"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  ticketmanagement_server_data:
  ticketmanagement_server_test_data:
